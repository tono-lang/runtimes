name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build --if-present
      - run: npm test

  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov --fail-under-lines 95 --lcov --output-path lcov.info

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      - run: go vet ./...
      - name: Test + coverage (>= 95%)
        run: |
          go test ./... -coverprofile=cover.out
          pct=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Go coverage: ${pct:-0}%"
          awk -v p="${pct:-0}" 'BEGIN { exit (p+0 >= 95) ? 0 : 1 }' \
            || { echo "::error::Go coverage ${pct:-0}% < 95%"; exit 1; }

  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]" || pip install . pytest pytest-cov ruff
      - run: ruff check .
      - run: pytest --cov --cov-fail-under=95

  java:
    name: Java
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4
      - name: Detect build system
        id: detect
        run: |
          if [ -f pom.xml ]; then echo "build=maven" >> "$GITHUB_OUTPUT"
          elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then echo "build=gradle" >> "$GITHUB_OUTPUT"
          else echo "build=none" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/setup-java@v4
        if: steps.detect.outputs.build != 'none'
        with:
          distribution: temurin
          java-version: "21"
      - name: Maven verify
        if: steps.detect.outputs.build == 'maven'
        run: mvn -B verify
      - name: Gradle build
        if: steps.detect.outputs.build == 'gradle'
        run: ./gradlew build
      - name: No build system yet
        if: steps.detect.outputs.build == 'none'
        run: echo "No Java build system present yet; skipping."

  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs: [ts, rust, go, python, java]
    if: always()
    steps:
      - run: |
          for r in "${{ needs.ts.result }}" "${{ needs.rust.result }}" "${{ needs.go.result }}" "${{ needs.python.result }}" "${{ needs.java.result }}"; do
            [ "$r" = "success" ] || { echo "a language job failed"; exit 1; }
          done
          echo "all language jobs passed"
